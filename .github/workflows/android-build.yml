name: Android Release Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Create Android SDK folders
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          mkdir -p $ANDROID_SDK_ROOT/licenses

      - name: Download Android command line tools
        run: |
          curl -sSL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o /tmp/cmdline.zip
          unzip -q /tmp/cmdline.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

      - name: Add sdkmanager to PATH
        run: echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Accept licenses
        run: yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Decode google-services.json if provided
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Create local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > android/local.properties
          cat android/local.properties

      - name: Grant execute to gradlew
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew clean assembleRelease --no-daemon --stacktrace --info
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Decode keystore if provided
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/my-release-key.jks

      - name: Sign and align APK if keystore provided
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          APK_IN=android/app/build/outputs/apk/release/app-release-unsigned.apk
          APK_ALIGNED=android/app/build/outputs/apk/release/app-release-aligned.apk
          APK_SIGNED=android/app/build/outputs/apk/release/app-release-signed.apk
          $ANDROID_SDK_ROOT/build-tools/33.0.2/zipalign -v -p 4 "$APK_IN" "$APK_ALIGNED"
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $HOME/my-release-key.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" "$APK_ALIGNED" "${{ secrets.KEY_ALIAS }}"
          jarsigner -verify -verbose -certs "$APK_ALIGNED"
          mv "$APK_ALIGNED" "$APK_SIGNED"

      - name: Upload unsigned APK artifact
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload signed APK artifact
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: android/app/build/outputs/apk/release/app-release-signed.apk

