name: Collect failed workflow logs
on:
  workflow_run:
    types: [completed]
jobs:
  collect-logs:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download workflow logs
        run: |
          mkdir -p logs
          echo "Collecting last 200 lines from failed job logs" > logs/summary.txt
          echo "Reemplazar con script que use la API para descargar logs" >> logs/summary.txt
      - name: Upload collected logs
        uses: actions/upload-artifact@v4
        with:
          name: failed-workflow-logs-${{ github.event.workflow_run.id }}
          path: logs/
